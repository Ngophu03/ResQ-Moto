<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResQ Moto Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body>
  <div class="background-orbs" aria-hidden="true">
    <span class="orb orb-one"></span>
    <span class="orb orb-two"></span>
    <span class="orb orb-three"></span>
  </div>

  <header class="topbar glass">
    <div class="brand-block">
      <div class="brand-mark">A</div>
      <div>
        <p class="eyebrow">ResQ Moto</p>
        <h1 data-i18n="adminTitle">Dashboard quản lý đơn</h1>
      </div>
    </div>
    <div class="topbar-actions">
      <a class="btn btn-ghost" href="../index.html">← Back to app</a>
      <div class="lang-switch">
        <button id="langViBtn" class="lang-btn is-active" type="button">VI</button>
        <button id="langEnBtn" class="lang-btn" type="button">EN</button>
      </div>
    </div>
  </header>

  <main class="app-shell">
    <section class="booking-panel glass">
      <div class="section-title">
        <h3 data-i18n="adminTitle">Dashboard quản lý đơn</h3>
        <p data-i18n="adminDesc">Thống kê demo từ các booking đã xác nhận trong localStorage.</p>
      </div>

      <div class="metrics-grid">
        <div class="metric-box"><span>Total bookings</span><strong id="metricBookings">0</strong></div>
        <div class="metric-box"><span>Cash</span><strong id="metricCash">0</strong></div>
        <div class="metric-box"><span>Transfer</span><strong id="metricTransfer">0</strong></div>
      </div>

      <div class="metrics-grid" style="margin-top:12px;">
        <div class="metric-box"><span>Latest service</span><strong id="metricService">—</strong></div>
        <div class="metric-box"><span>Latest driver</span><strong id="metricDriver">—</strong></div>
        <div class="metric-box"><span>Total value</span><strong id="metricRevenue">0đ</strong></div>
      </div>
    </section>

    <section class="map-stage glass" style="padding:18px; min-height: 600px;">
      <div class="section-title">
        <h3>Recent confirmed bookings</h3>
      </div>
      <div id="bookingList" class="driver-list"></div>
    </section>
  </main>

  <script src="../js/data.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
